# avangarde/config.yaml
app:
  name: "Avangarde"
  version: "1.0.0"
  
mt5:
  relay_url: "http://192.168.1.50:5000/trade"
  timeout: 1.5   # Kill the trade attempt if no response in 1.5s
  retries: 0     # In sniping, you usually don't retry; the entry is gone
  
llm:
  primary: "deepseek"
  fallback: "kimi"
  circuit_breaker:
    max_failures: 3
    lockout_seconds: 60

trading:
  assets: ["BTC", "ETH", "XAUUSD", "EURUSD"]
  risk:
    max_drawdown: 0.05
    max_position_size: 0.5 # Lots
    confidence_threshold: 0.85

ingestors:
  telegram:
    channels: [-100123456789] # List of IDs
