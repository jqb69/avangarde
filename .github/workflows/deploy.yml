---
# .github/workflow/deploy.yml
name: Deploy OpenClaw Sniper

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Tests
        env:
          TG_SESSION_STR: "test_mode"
        run: |
          pip install -r run/requirements.txt
          pip install pytest pytest-asyncio
          python -m pytest test/test_openclaw.py

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Map secrets to env vars here
          TG_SESSION_STR: ${{ secrets.TG_SESSION_STR }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_API_ID: "37419532"
          IMAGE_NAME: "ghcr.io/${{ github.repository }}:latest"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DIGITAL_OCEAN_IP }}
          username: ${{ secrets.DIGITAL_OCEAN_USER }}
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          # CRITICAL: Tell the action which env vars to export to the Droplet
          envs: TG_SESSION_STR,TG_API_HASH,TG_API_ID,IMAGE_NAME,GH_TOKEN,GH_ACTOR
          script: |
            cd /home/${{ secrets.DIGITAL_OCEAN_USER }}/dos
            chmod +x rundos.sh
            bash rundos.sh
