---
# .github/workflow/deploy.yml
name: Deploy OpenClaw Sniper

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Tests
        env:
          TG_SESSION_STR: "test_mode"
        run: |
          pip install -r run/requirements.txt
          pip install pytest pytest-asyncio
          python -m pytest test/test_openclaw.py

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: avanenv
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.DIGITAL_OCEAN_IP }}" ]; then echo "Missing IP"; exit 1; fi
          if [ -z "${{ secrets.DIGITAL_OCEAN_SSH_KEY }}" ]; then echo "Missing SSH Key"; exit 1; fi
          if [ -z "${{ secrets.TG_SESSION_STR }}" ]; then echo "Missing Telegram Session"; exit 1; fi
          # Add others as needed

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          file: run/Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/avangarde:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy deployment scripts to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DIGITAL_OCEAN_IP }}
          username: ${{ secrets.DIGITAL_OCEAN_USER }}
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          source: "docker-compose.yml,dos/*" 
          target: "~/avangarde"
          strip_components: 0

      - name: SSH Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        env:
          TG_SESSION_STR: ${{ secrets.TG_SESSION_STR }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          IMAGE_NAME: "ghcr.io/${{ github.repository_owner }}/avangarde:latest"
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DIGITAL_OCEAN_IP }}
          username: ${{ secrets.DIGITAL_OCEAN_USER }}
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          envs: TG_SESSION_STR,TG_API_HASH,TG_API_ID,IMAGE_NAME,GH_TOKEN,GH_ACTOR
          script: |
            cd ~/avangarde/dos
            chmod +x ~/avangarde/dos/rundos.sh
            ./rundos.sh
