name: Deploy OpenClaw Sniper

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Tests
        env:
          TG_SESSION_STR: "test_mode"
        run: |
          pip install -r requirements.txt
          pip install pytest
          python -m pytest test_openclaw.py

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DIGITAL_OCEAN_IP }}
          username: ${{ secrets.DIGITAL_OCEAN_USER }}
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          envs: TG_SESSION_STR,TG_API_ID,TG_API_HASH
          script: |
            # Create a clean deployment environment
            mkdir -p /home/${{ secrets.DIGITAL_OCEAN_USER }}/dos
            
            # Pass secrets to the remote script
            export TG_SESSION_STR="${{ secrets.TG_SESSION_STR }}"
            export TG_API_ID="${{ secrets.TG_API_ID }}"
            export TG_API_HASH="${{ secrets.TG_API_HASH }}"
            export IMAGE_NAME="ghcr.io/${{ github.repository }}:latest"
            export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            export GH_ACTOR="${{ github.actor }}"

            bash /home/${{ secrets.DIGITAL_OCEAN_USER }}/dos/rundos.sh
