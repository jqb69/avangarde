---
# .github/deploy.yaml
name: Deploy OpenClaw to Digital Ocean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: avanenv  # <--- GitHub now pulls secrets from 'avanenv' scope
    steps:
    - uses: actions/checkout@v4

    - name: Check secrets
      env:
        DIGITAL_OCEAN_IP: ${{ secrets.DIGITAL_OCEAN_IP }}
        DIGITAL_OCEAN_USER: ${{ secrets.DIGITAL_OCEAN_USER }}
        DIGITAL_OCEAN_SSH_KEY: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        [ -z "$DIGITAL_OCEAN_IP" ] && { echo "Error: DIGITAL_OCEAN_IP missing"; exit 1; }
        [ -z "$DIGITAL_OCEAN_USER" ] && { echo "Error: DIGITAL_OCEAN_USER missing"; exit 1; }
        [ -z "$DIGITAL_OCEAN_SSH_KEY" ] && { echo "Error: DIGITAL_OCEAN_SSH_KEY missing"; exit 1; }
        [ -z "$DOCKER_USERNAME" ] && { echo "Error: DOCKER_USERNAME missing"; exit 1; }
        [ -z "$DOCKER_PASSWORD" ] && { echo "Error: DOCKER_PASSWORD missing"; exit 1; }
        echo "All secrets OK."

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./run/Dockerfile
        push: true
        # Using the secret defined in avanenv
        tags: ${{ secrets.DOCKER_USERNAME }}/openclaw:latest

    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DIGITAL_OCEAN_IP }}
        username: ${{ secrets.DIGITAL_OCEAN_USER }}
        key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
        source: "dos/rundos.sh,docker-compose.yml"
        target: "/home/openclaw/openclaw/"
        strip_components: 0

    - name: Deploy on Digital Ocean
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DIGITAL_OCEAN_IP }}
        username: ${{ secrets.DIGITAL_OCEAN_USER }}
        key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
        # Bridge: Carries these variables over the SSH tunnel
        envs: DOCKER_HUB_USER, REDIS_URL
        script: |
          # The "Non-Presumptuous" Path Check
          mkdir -p /home/openclaw/openclaw
          cd /home/openclaw/openclaw
          chmod +x dos/rundos.sh
          ./dos/rundos.sh
      env:
        # Translator: secret DOCKER_USERNAME -> script DOCKER_HUB_USER
        DOCKER_HUB_USER: ${{ secrets.DOCKER_USERNAME }}
        REDIS_URL: ${{ secrets.REDIS_URL }}

  test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
    - uses: actions/checkout@v4
    - name: Test OpenClaw
      env:
        DIGITAL_OCEAN_IP: ${{ secrets.DIGITAL_OCEAN_IP }}
      run: |
        pip install requests
        python test/test_openclaw.py
