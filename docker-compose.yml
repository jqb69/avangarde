---
# docker-compose.yaml
version: '3.8'

services:
  openclaw-api:
    # Use the image built from the local Dockerfile
    build:
      context: .
      dockerfile: run/Dockerfile
    container_name: openclaw-api
    restart: always
    ports:
      - "80:80"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://openclaw-redis:6379/0 # Use the container_name
      - MODE=api
    depends_on:
      - redis

  openclaw-agent:
    build:
      context: .
      dockerfile: run/Dockerfile
    container_name: openclaw-agent
    command: python3 main.py
    restart: always
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://openclaw-redis:6379/0 # Use the container_name
      - MODE=agent
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: always
    # Expose port so you can check it from the Droplet if needed
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
