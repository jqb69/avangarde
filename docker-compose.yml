---
# docker-compose.yaml
version: '3.8'

services:
  openclaw-api:
    image: ${IMAGE_NAME}
    container_name: openclaw-api
    restart: always
    # SPECIFIED: This puts the container directly on the Droplet network
    network_mode: "host" 
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MODE=api
      # Since we are on host network, Redis is at localhost
      - REDIS_URL=redis://127.0.0.1:6379/0

  openclaw-agent:
    image: ${IMAGE_NAME}
    container_name: openclaw-agent
    command: python3 main.py
    restart: always
    # SPECIFIED: No virtual bridge, just raw speed
    network_mode: "host"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MODE=agent
      - REDIS_URL=redis://127.0.0.1:6379/0

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: always
    # MUST BE HOST MODE TOO
    network_mode: "host" 
    # 'ports' is useless in host mode, so we drop it to keep it clean
    volumes:
      - redis_data:/data

volumes:
  redis_data:
